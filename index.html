<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="favicon.png">
  <title>Ollama Chat with Thinking</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f1115;
      color: #e6e6e6;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      padding: 10px 14px;
      border-bottom: 1px solid #222;
      background: #15181f;
    }

    .topbar label {
      font-size: 14px;
      color: #bbb;
    }

    .topbar input[type="text"],
    .topbar select {
      padding: 8px 10px;
      border: 1px solid #333;
      border-radius: 8px;
      background: #0f1115;
      color: #eee;
      min-width: 180px;
      font: inherit;
    }

    .topbar select {
      min-width: 220px;
    }

    .topbar input:focus,
    .topbar select:focus,
    textarea:focus {
      border-color: #555;
      outline: none;
    }

    .toggle-wrap {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border: 1px solid #333;
      border-radius: 10px;
      background: #1a1f28;
      font-size: 14px;
      color: #ccc;
    }

    .chat-wrap {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      background: #0f1115;
    }

    .row {
      display: flex;
      width: 100%;
    }

    .row.assistant {
      justify-content: flex-start;
    }

    .row.user {
      justify-content: flex-end;
    }

    .row.system {
      justify-content: flex-start;
    }

    .card {
      width: min(760px, 82%);
      background: #1a1f28;
      border: 1px solid #2a2f3a;
      border-radius: 14px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 70px;
    }

    .row.user .card {
      background: #202532;
      border-color: #323848;
    }

    .row.system .card {
      background: #2a1f1f;
      border-color: #5a2a2a;
    }

    .thinking-box {
      display: none;
      padding: 12px 16px;
      border-bottom: 1px solid #2a2f3a;
      background: #141820;
    }

    .thinking-box.visible {
      display: block;
    }

    .thinking-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: #8a93a5;
      margin-bottom: 8px;
    }

    .thinking-content,
    .content {
      line-height: 1.5;
      word-break: break-word;
    }

    .thinking-content {
      color: #cfd6e6;
    }

    .content {
      padding: 14px 16px 12px 16px;
    }

    .thinking-content p:first-child,
    .thinking-content h1:first-child,
    .thinking-content h2:first-child,
    .thinking-content h3:first-child,
    .thinking-content ul:first-child,
    .thinking-content ol:first-child,
    .thinking-content pre:first-child,
    .thinking-content blockquote:first-child,
    .content p:first-child,
    .content h1:first-child,
    .content h2:first-child,
    .content h3:first-child,
    .content ul:first-child,
    .content ol:first-child,
    .content pre:first-child,
    .content blockquote:first-child {
      margin-top: 0;
    }

    .thinking-content p:last-child,
    .thinking-content h1:last-child,
    .thinking-content h2:last-child,
    .thinking-content h3:last-child,
    .thinking-content ul:last-child,
    .thinking-content ol:last-child,
    .thinking-content pre:last-child,
    .thinking-content blockquote:last-child,
    .content p:last-child,
    .content h1:last-child,
    .content h2:last-child,
    .content h3:last-child,
    .content ul:last-child,
    .content ol:last-child,
    .content pre:last-child,
    .content blockquote:last-child {
      margin-bottom: 0;
    }

    .thinking-content pre,
    .content pre {
      background: #0b0d12;
      color: #f0f0f0;
      padding: 12px;
      border-radius: 10px;
      overflow-x: auto;
    }

    .thinking-content code,
    .content code {
      background: #2a2f3a;
      padding: 2px 5px;
      border-radius: 6px;
    }

    .thinking-content pre code,
    .content pre code {
      background: transparent;
      padding: 0;
    }

    .bottom-toolbar {
      margin-top: auto;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 6px;
      padding: 8px 10px;
      border-top: 1px solid #2a2f3a;
      background: #141820;
    }

    .message-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #8a93a5;
      font-size: 12px;
      line-height: 1.2;
      flex-wrap: wrap;
      margin-right: auto;
    }

    .message-actions {
      display: flex;
      gap: 6px;
    }

    .icon-btn,
    .action {
      border: 1px solid #333;
      background: #1a1f28;
      color: #ddd;
      border-radius: 8px;
      padding: 6px 9px;
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
    }

    .action {
      border-radius: 10px;
      padding: 10px 14px;
      line-height: normal;
    }

    .icon-btn:hover,
    .action:hover {
      background: #252b36;
    }

    .icon-btn:disabled,
    .action:disabled {
      background: #141820;
      color: #555;
      border-color: #222;
      cursor: not-allowed;
      opacity: 1;
    }

    .primary {
      background: #3a6df0;
      color: #fff;
      border-color: #3a6df0;
    }

    .primary:hover {
      background: #5a84f5;
    }

    .composer {
      border-top: 1px solid #222;
      background: #15181f;
      padding: 12px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: end;
    }

    .input-wrap {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    textarea {
      width: 100%;
      min-height: 90px;
      resize: vertical;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 12px;
      font: inherit;
      background: #0f1115;
      color: #eee;
    }

    .composer-actions {
      display: flex;
      gap: 8px;
    }

    .muted {
      color: #8a93a5;
      font-size: 13px;
    }

    .streaming-cursor::after {
      content: "▌";
      margin-left: 2px;
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0%, 50%, 100% { opacity: 1; }
      25%, 75% { opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <label for="model">Model</label>
    <input id="model" type="text" value="qwen3" />

    <label for="modelDropdown">Installed Models</label>
    <select id="modelDropdown">
      <option value="" disabled selected>Select model</option>
    </select>

    <button id="refreshModelsBtn" class="action" type="button">Refresh Models</button>

    <label for="host">Ollama Host</label>
    <input
      id="host"
      type="text"
      value="http://localhost:11434"
      style="min-width: 250px;"
    />

    <label for="apiPath">API Path</label>
    <input
      id="apiPath"
      type="text"
      value="/api/chat"
      style="min-width: 140px;"
    />

    <label class="toggle-wrap">
      <input id="thinkToggle" type="checkbox" />
      <span>Request Thinking</span>
    </label>

    <span class="muted">Thinking preference is reused for future replies.</span>
  </div>

  <div id="chat" class="chat-wrap"></div>

  <div class="composer">
    <div class="input-wrap">
      <textarea id="prompt" placeholder="Write your message in markdown..."></textarea>
      <div class="muted">Enter to send. Shift+Enter for new line.</div>
    </div>
    <div class="composer-actions">
      <button id="clearBtn" class="action">Clear</button>
      <button id="sendBtn" class="action primary">Send</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/lib/marked.umd.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.6/dist/purify.min.js"></script>
  <script>
    const chatEl = document.getElementById("chat");
    const promptEl = document.getElementById("prompt");
    const sendBtn = document.getElementById("sendBtn");
    const clearBtn = document.getElementById("clearBtn");
    const modelEl = document.getElementById("model");
    const modelDropdown = document.getElementById("modelDropdown");
    const refreshModelsBtn = document.getElementById("refreshModelsBtn");
    const hostEl = document.getElementById("host");
    const apiPathEl = document.getElementById("apiPath");
    const thinkToggle = document.getElementById("thinkToggle");

    let messages = [];
    let lastUserText = "";
    let isGenerating = false;
    let thinkingDefaultExpanded = true;

    marked.setOptions({
      gfm: true,
      breaks: true
    });

    function renderMarkdown(md) {
      const raw = marked.parse(md || "");
      return DOMPurify.sanitize(raw);
    }

    function scrollToBottom() {
      chatEl.scrollTop = chatEl.scrollHeight;
    }

    function formatClockTime(date) {
      return new Date(date).toLocaleTimeString([], {
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit"
      });
    }

    function formatDuration(ms) {
      if (typeof ms !== "number" || ms < 0) return "";
      if (ms < 1000) return `${ms} ms`;

      const totalSeconds = ms / 1000;
      if (totalSeconds < 60) return `${totalSeconds.toFixed(1)} s`;

      const minutes = Math.floor(totalSeconds / 60);
      const seconds = (totalSeconds % 60).toFixed(1);
      return `${minutes}m ${seconds}s`;
    }

    async function copyText(text) {
      try {
        await navigator.clipboard.writeText(text);
      } catch (_) {
        alert("Could not copy text.");
      }
    }

    async function extractErrorFromResponse(response) {
      const raw = await response.text();

      try {
        const data = JSON.parse(raw);
        if (data && typeof data.error === "string" && data.error.trim()) {
          return data.error;
        }
      } catch (_) {}

      const text = raw.trim();
      if (text) return text;

      return `HTTP ${response.status} ${response.statusText}`;
    }

    function normalizeHost(host) {
      return (host || "").trim().replace(/\/+$/, "");
    }

    function normalizePath(path) {
      const trimmed = (path || "").trim();
      if (!trimmed) return "/api/chat";
      return trimmed.startsWith("/") ? trimmed : `/${trimmed}`;
    }

    function buildEndpointUrl() {
      return `${normalizeHost(hostEl.value)}${normalizePath(apiPathEl.value)}`;
    }

    function buildTagsUrl() {
      const host = normalizeHost(hostEl.value);
      const apiPath = normalizePath(apiPathEl.value);

      if (apiPath.endsWith("/chat")) {
        return `${host}${apiPath.slice(0, -"/chat".length)}/tags`;
      }

      if (apiPath.endsWith("/generate")) {
        return `${host}${apiPath.slice(0, -"/generate".length)}/tags`;
      }

      if (apiPath.endsWith("/tags")) {
        return `${host}${apiPath}`;
      }

      if (apiPath.endsWith("/api")) {
        return `${host}${apiPath}/tags`;
      }

      return `${host}/api/tags`;
    }

    async function loadModelList() {
      const previousValue = modelDropdown.value;
      modelDropdown.innerHTML = `<option value="" disabled selected>Select model</option>`;
      modelDropdown.disabled = true;
      refreshModelsBtn.disabled = true;

      try {
        const response = await fetch(buildTagsUrl());

        if (!response.ok) {
          const serverError = await extractErrorFromResponse(response);
          throw new Error(serverError);
        }

        const data = await response.json();
        const models = Array.isArray(data.models) ? data.models : [];

        modelDropdown.innerHTML = "";

        const placeholder = document.createElement("option");
        placeholder.value = "";
        placeholder.textContent = "Select model";
        placeholder.disabled = true;
        placeholder.selected = true;
        modelDropdown.appendChild(placeholder);

        if (!models.length) {
          const empty = document.createElement("option");
          empty.value = "";
          empty.textContent = "No models found";
          empty.disabled = true;
          modelDropdown.appendChild(empty);
          return;
        }

        const names = models
          .map(item => item?.name || item?.model)
          .filter(Boolean);

        for (const modelName of names) {
          const option = document.createElement("option");
          option.value = modelName;
          option.textContent = modelName;
          modelDropdown.appendChild(option);
        }

        const typed = modelEl.value.trim();

        if (names.includes(typed)) {
          modelDropdown.value = typed;
        } else if (names.includes(previousValue)) {
          modelDropdown.value = previousValue;
        } else {
          modelDropdown.value = "";
        }
      } catch (err) {
        const message = err instanceof Error ? err.message : String(err);
        modelDropdown.innerHTML = `<option value="" disabled selected>Select model</option>`;

        messages.push({
          role: "system",
          content: `Loading model list failed.\n\nError:\n${message}`
        });

        createMessageCard("system", `**Error loading model list:** ${message}`, {
          getRawText: () => `Error loading model list: ${message}`,
          startTime: new Date()
        });
      } finally {
        modelDropdown.disabled = false;
        refreshModelsBtn.disabled = false;
      }
    }

    function createMessageCard(role, rawText, opts = {}) {
      const row = document.createElement("div");
      row.className = `row ${role}`;

      const card = document.createElement("div");
      card.className = "card";

      let thinkingBox = null;
      let thinkingContent = null;
      let thinkingBtn = null;
      let thinkingTextValue = "";
      let thinkingExpanded = thinkingDefaultExpanded;
      let hasUserManuallyToggledThisCard = false;

      let messageStartTime = opts.startTime || null;
      let messageModel = opts.modelName || "";
      let messageDurationMs = opts.durationMs ?? null;

      if (role === "assistant") {
        thinkingBox = document.createElement("div");
        thinkingBox.className = "thinking-box";

        const thinkingTitle = document.createElement("div");
        thinkingTitle.className = "thinking-title";
        thinkingTitle.textContent = "Thinking";

        thinkingContent = document.createElement("div");
        thinkingContent.className = "thinking-content";

        thinkingBox.appendChild(thinkingTitle);
        thinkingBox.appendChild(thinkingContent);
        card.appendChild(thinkingBox);
      }

      const content = document.createElement("div");
      content.className = "content";
      content.innerHTML = renderMarkdown(rawText);

      const toolbar = document.createElement("div");
      toolbar.className = "bottom-toolbar";

      const meta = document.createElement("div");
      meta.className = "message-meta";
      toolbar.appendChild(meta);

      const actions = document.createElement("div");
      actions.className = "message-actions";
      toolbar.appendChild(actions);

      function renderMeta() {
        const parts = [];

        if (role === "user") {
          if (messageStartTime) {
            parts.push(`Started: ${formatClockTime(messageStartTime)}`);
          }
        } else if (role === "assistant") {
          if (messageModel) {
            parts.push(`Model: ${messageModel}`);
          }
          if (messageStartTime) {
            parts.push(`Started: ${formatClockTime(messageStartTime)}`);
          }
          if (messageDurationMs !== null && messageDurationMs !== undefined) {
            parts.push(`Took: ${formatDuration(messageDurationMs)}`);
          }
        } else if (role === "system") {
          if (messageStartTime) {
            parts.push(`Started: ${formatClockTime(messageStartTime)}`);
          }
          if (messageDurationMs !== null && messageDurationMs !== undefined) {
            parts.push(`Took: ${formatDuration(messageDurationMs)}`);
          }
        }

        meta.textContent = parts.join(" • ");
      }

      renderMeta();

      const copyBtn = document.createElement("button");
      copyBtn.className = "icon-btn";
      copyBtn.title = "Copy";
      copyBtn.textContent = "⧉";
      copyBtn.onclick = () => copyText(opts.getRawText ? opts.getRawText() : rawText);
      actions.appendChild(copyBtn);

      const editBtn = document.createElement("button");
      editBtn.className = "icon-btn";
      editBtn.title = "Edit";
      editBtn.textContent = "✎";
      editBtn.onclick = () => {
        promptEl.value = opts.getRawText ? opts.getRawText() : rawText;
        promptEl.focus();
      };
      actions.appendChild(editBtn);

      if (role === "assistant") {
        thinkingBtn = document.createElement("button");
        thinkingBtn.className = "icon-btn";
        thinkingBtn.title = "Show or hide thinking";
        thinkingBtn.textContent = "🧠";
        thinkingBtn.disabled = true;
        thinkingBtn.onclick = () => {
          if (thinkingBtn.disabled) return;
          hasUserManuallyToggledThisCard = true;
          thinkingExpanded = !thinkingExpanded;
          thinkingDefaultExpanded = thinkingExpanded;
          syncThinkingVisibility();
        };
        actions.appendChild(thinkingBtn);

        const regenBtn = document.createElement("button");
        regenBtn.className = "icon-btn";
        regenBtn.title = "Regenerate";
        regenBtn.textContent = "↻";
        regenBtn.onclick = () => {
          if (!isGenerating && lastUserText.trim()) {
            regenerateLastAssistant();
          }
        };
        actions.appendChild(regenBtn);
      }

      card.appendChild(content);
      card.appendChild(toolbar);
      row.appendChild(card);
      chatEl.appendChild(row);
      scrollToBottom();

      function syncThinkingVisibility() {
        if (!thinkingBox || !thinkingBtn) return;

        const hasThinking = thinkingTextValue.trim().length > 0;
        thinkingBtn.disabled = !hasThinking;
        thinkingBtn.textContent = hasThinking
          ? (thinkingExpanded ? "🧠−" : "🧠+")
          : "🧠";

        if (hasThinking && thinkingExpanded) {
          thinkingBox.classList.add("visible");
        } else {
          thinkingBox.classList.remove("visible");
        }
      }

      const api = {
        row,
        card,
        content,
        setRawText(newText) {
          content.innerHTML = renderMarkdown(newText);
          scrollToBottom();
        },
        setThinkingText(newThinking) {
          if (!thinkingContent) return;

          thinkingTextValue = newThinking || "";
          thinkingContent.innerHTML = renderMarkdown(thinkingTextValue);

          if (!hasUserManuallyToggledThisCard) {
            thinkingExpanded = thinkingDefaultExpanded;
          }

          syncThinkingVisibility();
          scrollToBottom();
        },
        getThinkingText() {
          return thinkingTextValue;
        },
        setStartTime(newStartTime) {
          messageStartTime = newStartTime;
          renderMeta();
        },
        setModelName(newModelName) {
          messageModel = newModelName || "";
          renderMeta();
        },
        setDurationMs(newDurationMs) {
          messageDurationMs = newDurationMs;
          renderMeta();
        },
        setTyping(isTyping) {
          if (isTyping) {
            content.classList.add("streaming-cursor");
          } else {
            content.classList.remove("streaming-cursor");
          }
        }
      };

      syncThinkingVisibility();
      return api;
    }

    function removeLastAssistantFromState() {
      for (let i = messages.length - 1; i >= 0; i--) {
        if (messages[i].role === "assistant") {
          messages.splice(i, 1);
          return;
        }
      }
    }

    function removeLastAssistantFromUI() {
      const rows = [...chatEl.querySelectorAll(".row.assistant")];
      if (rows.length) {
        rows[rows.length - 1].remove();
      }
    }

    async function streamChat(userText, isRegenerate = false) {
      const trimmed = userText.trim();
      if (!trimmed || isGenerating) return;

      const requestStartedAt = new Date();
      const requestStartedMs = Date.now();
      const activeModelName = modelEl.value.trim();

      isGenerating = true;
      sendBtn.disabled = true;

      if (!isRegenerate) {
        lastUserText = trimmed;
        messages.push({ role: "user", content: trimmed });

        createMessageCard("user", trimmed, {
          getRawText: () => trimmed,
          startTime: requestStartedAt
        });
      }

      let assistantText = "";
      let assistantThinking = "";

      const assistantCard = createMessageCard("assistant", "", {
        getRawText: () => assistantText,
        startTime: requestStartedAt,
        modelName: activeModelName
      });
      assistantCard.setTyping(true);

      try {
        const response = await fetch(buildEndpointUrl(), {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            model: modelEl.value.trim(),
            messages,
            stream: true,
            think: thinkToggle.checked
          })
        });

        if (!response.ok) {
          const serverError = await extractErrorFromResponse(response);
          throw new Error(serverError);
        }

        if (!response.body) {
          throw new Error("Streaming response body not available.");
        }

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";

        while (true) {
          const { value, done } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split("\n");
          buffer = lines.pop() || "";

          for (const line of lines) {
            const trimmedLine = line.trim();
            if (!trimmedLine) continue;

            let chunk;
            try {
              chunk = JSON.parse(trimmedLine);
            } catch (_) {
              continue;
            }

            if (chunk.error) {
              throw new Error(chunk.error);
            }

            const piece = chunk?.message?.content || "";
            const thinkPiece = chunk?.message?.thinking || "";

            if (thinkPiece) {
              assistantThinking += thinkPiece;
              assistantCard.setThinkingText(assistantThinking);
            }

            if (piece) {
              assistantText += piece;
              assistantCard.setRawText(assistantText);
            }
          }
        }

        if (buffer.trim()) {
          let chunk;
          try {
            chunk = JSON.parse(buffer.trim());
          } catch (_) {
            chunk = null;
          }

          if (chunk?.error) {
            throw new Error(chunk.error);
          }

          const piece = chunk?.message?.content || "";
          const thinkPiece = chunk?.message?.thinking || "";

          if (thinkPiece) {
            assistantThinking += thinkPiece;
            assistantCard.setThinkingText(assistantThinking);
          }

          if (piece) {
            assistantText += piece;
            assistantCard.setRawText(assistantText);
          }
        }

        if (!assistantText.trim()) {
          assistantText = "_No response received._";
          assistantCard.setRawText(assistantText);
        }

        assistantCard.setDurationMs(Date.now() - requestStartedMs);

        messages.push({
          role: "assistant",
          content: assistantText
        });
      } catch (err) {
        const errorMessage = err instanceof Error ? err.message : String(err);
        const errorText =
          `**Error:** ${errorMessage}\n\n` +
          `- Make sure Ollama is running\n` +
          `- Make sure the model exists\n` +
          `- Make sure the page is served from a local web server\n` +
          `- Make sure Ollama allows your origin`;

        assistantCard.row.remove();

        messages.push({
          role: "system",
          content:
            `Previous Ollama request failed.\n\n` +
            `User input:\n${trimmed}\n\n` +
            `Error:\n${errorMessage}`
        });

        createMessageCard("system", errorText, {
          getRawText: () => errorText,
          startTime: requestStartedAt,
          durationMs: Date.now() - requestStartedMs
        });
      } finally {
        assistantCard.setTyping(false);
        isGenerating = false;
        sendBtn.disabled = false;
      }
    }

    async function regenerateLastAssistant() {
      removeLastAssistantFromState();
      removeLastAssistantFromUI();
      await streamChat(lastUserText, true);
    }

    modelDropdown.addEventListener("change", () => {
      if (modelDropdown.value) {
        modelEl.value = modelDropdown.value;
      }
    });

    modelEl.addEventListener("input", () => {
      const typed = modelEl.value.trim();
      const options = [...modelDropdown.options]
        .map(opt => opt.value)
        .filter(Boolean);

      if (options.includes(typed)) {
        modelDropdown.value = typed;
      } else {
        modelDropdown.value = "";
      }
    });

    refreshModelsBtn.addEventListener("click", loadModelList);

    sendBtn.addEventListener("click", async () => {
      const text = promptEl.value;
      if (!text.trim()) return;
      promptEl.value = "";
      await streamChat(text, false);
    });

    promptEl.addEventListener("keydown", async (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendBtn.click();
      }
    });

    clearBtn.addEventListener("click", () => {
      chatEl.innerHTML = "";
      promptEl.value = "";
      messages = [];
      lastUserText = "";
      isGenerating = false;
      sendBtn.disabled = false;
      promptEl.focus();
    });

    createMessageCard(
      "assistant",
      `# Streaming Markdown Chat

- Assistant on the left
- User on the right
- Type a model name or pick one from Installed Models
- "Select model" stays as the first dropdown option
- Ollama Host and API Path are stored separately
- Refresh Models uses the host value to query installed models
- Request Thinking toggle sends \`think: true/false\`
- Thinking is collapsible per message
- Thinking preference is reused for future replies
- Errors are shown in the response and also added as \`system\` messages`,
      {
        startTime: new Date(),
        modelName: modelEl.value.trim()
      }
    );

    loadModelList();
  </script>
</body>
</html>
